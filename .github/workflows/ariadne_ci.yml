name: Ariadne CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest tree-sitter tree-sitter-rust tree-sitter-python
        
    - name: Run Pytest
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python -m pytest tests/

  benchmark:
    name: Benchmarks
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only run benchmarks on main branch push to save costs
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install tree-sitter tree-sitter-rust tree-sitter-python
        
    - name: Run Eval Runner
      env:
        ARIADNE_MODEL: ${{ secrets.ARIADNE_MODEL }}
        ARIADNE_API_KEY: ${{ secrets.ARIADNE_API_KEY }}
        ARIADNE_API_BASE: ${{ secrets.ARIADNE_API_BASE }}
      run: python scripts/eval_runner.py
